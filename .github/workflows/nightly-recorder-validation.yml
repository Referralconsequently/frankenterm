name: Nightly Recorder Validation

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-recorder-validation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  recorder-validation-nightly:
    name: Recorder Validation (nightly full)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-recorder-validation

      - name: Run recorder validation gates (nightly mode)
        env:
          FT_RECORDER_GATE_RUN_LOAD_BENCH: "1"
        run: scripts/check_recorder_validation_gates.sh

      - name: Aggregate visual artifact summaries (if present)
        if: always()
        run: |
          set -euo pipefail
          summary_root="target/recorder-validation-gates/visual-artifact"
          mkdir -p "$summary_root"
          found=0
          if [[ -d e2e-artifacts ]]; then
            while IFS= read -r run_dir; do
              [[ -d "$run_dir/scenarios" ]] || continue
              found=1
              run_name=$(basename "$run_dir")
              out_path="$summary_root/${run_name}.summary.json"
              scripts/check_visual_artifact_detector.sh --run-dir "$run_dir" --output "$out_path" || true
            done < <(find e2e-artifacts -mindepth 1 -maxdepth 1 -type d | LC_ALL=C sort)
          fi
          if [[ "$found" -eq 0 ]]; then
            echo "No e2e run directories discovered for visual artifact aggregation"
          fi

      - name: Upload nightly recorder validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-recorder-validation
          path: |
            target/recorder-validation-gates/
            e2e-artifacts/**/visual_artifact_summary.json
            e2e-artifacts/**/visual_artifact_history.jsonl
          if-no-files-found: ignore
          retention-days: 30
