[features]
# Default-on so workspace builds include FrankenSearch + agent-detection integration.
# Use `--no-default-features` to compile without these dependencies.
default = ["agent-detection", "frankensearch"]
# Public feature flags (stable surface)
frankenterm = ["frankenterm-deps"]
vendored = ["frankenterm"]  # backward compat alias
browser = ["browser-automation"]
mcp = ["mcp-server"]
web = ["dep:fastapi", "dep:asupersync"]
streaming = ["web"]
tui = ["dep:ratatui", "dep:crossterm"]
ftui = ["dep:ftui"]
tui-widgets = ["dep:ftui-render", "dep:ftui-layout", "dep:ftui-style", "dep:ftui-widgets"]
tui-dashboard = ["tui-widgets", "dep:ftui-runtime", "dep:ftui-core", "dep:ftui-backend"]
rollout = ["tui", "ftui"]
metrics = []
native-wezterm = []
distributed = [
    "dep:asupersync",
    "dep:rustls",
    "dep:rustls-pemfile",
    "dep:x509-parser",
]
sync = ["dep:asupersync"]
asupersync-runtime = ["dep:asupersync"]
recorder-lexical = ["dep:tantivy"]
disk-pressure = ["dep:nix"]
semantic-search = ["dep:tokenizers", "dep:safetensors", "dep:half", "dep:fastembed", "dep:rmp-serde"]
# Feature gate for FrankenSearch integration.
frankensearch = ["dep:frankensearch"]
# Feature gate for filesystem-based coding-agent installation probes.
agent-detection = ["dep:franken-agent-detection"]
# Feature gate for FrankenRedis-backed session state primitives.
redis-session = [
    "dep:fr-store",
    "dep:fr-protocol",
    "dep:fr-config",
    "dep:fr-expire",
    "dep:fr-persist",
]
# Feature gate for cross_agent_session_resumer integration (vendored IR types).
session-resume = []
# Feature gate for generic subprocess bridge foundation.
subprocess-bridge = []
# Feature gate for mcp_agent_mail_rust coordination bridge.
agent-mail = ["subprocess-bridge"]
# Feature gate for vibe_cockpit telemetry export bridge.
vc-export = ["subprocess-bridge"]

# Optional heavy integrations - feature-gated (internal)
frankenterm-deps = ["dep:codec", "dep:config", "dep:mux", "dep:frankenterm-term"]
vendored-wezterm = ["frankenterm-deps"]  # backward compat alias
browser-automation = []
mcp-server = ["dep:fastmcp", "dep:toon_rust"]
