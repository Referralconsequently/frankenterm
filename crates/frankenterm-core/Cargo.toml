[package]
name = "frankenterm-core"
description = "Core library for FrankenTerm - swarm-native terminal platform for AI agent fleets"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
readme = "../../README.md"
keywords = ["terminal", "frankenterm", "automation", "ai-agents"]
categories = ["development-tools"]

[lints]
workspace = true

[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
futures.workspace = true

# Pattern matching
aho-corasick.workspace = true
memchr.workspace = true
fancy-regex.workspace = true
regex.workspace = true
bloomfilter.workspace = true

# Approval tokens and plan hashing
rand.workspace = true
sha2.workspace = true
hex = "0.4"

# Database
rusqlite.workspace = true

# Config
toml.workspace = true
serde_yaml.workspace = true

# Directory paths
dirs = "6.0.0"
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"] }

# File locking
fs2.workspace = true

base64 = "0.22.1"
crossbeam.workspace = true

# FrankenTerm crates (optional, in-tree ex-WezTerm)
codec = { workspace = true, optional = true }
config = { workspace = true, optional = true }
mux = { workspace = true, optional = true }
frankenterm-term = { workspace = true, optional = true }

# TUI (optional, behind feature)
ratatui = { workspace = true, optional = true }
crossterm = { workspace = true, optional = true }

# FrankenTUI (optional, migration target — see docs/adr/)
ftui = { workspace = true, optional = true }
ftui-core = { path = "../../../frankentui/crates/ftui-core", optional = true }
ftui-render = { path = "../../../frankentui/crates/ftui-render", optional = true }
ftui-layout = { path = "../../../frankentui/crates/ftui-layout", optional = true }
ftui-style = { path = "../../../frankentui/crates/ftui-style", optional = true }
ftui-widgets = { path = "../../../frankentui/crates/ftui-widgets", optional = true }
ftui-runtime = { path = "../../../frankentui/crates/ftui-runtime", optional = true }
ftui-backend = { path = "../../../frankentui/crates/ftui-backend", optional = true }

# MCP server (optional, behind feature)
fastmcp = { workspace = true, optional = true }
toon_rust = { workspace = true, optional = true }
# Web server (optional, behind feature)
fastapi = { workspace = true, optional = true }
# Sync (optional, behind feature)
asupersync = { workspace = true, optional = true, features = ["tls"] }
# Distributed mode (optional, behind feature)
rustls = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }
x509-parser = { workspace = true, optional = true }
# Lexical search (optional, behind feature)
tantivy = { workspace = true, optional = true }
nix = { workspace = true, optional = true, features = ["fs"] }
# FrankenSearch integration (optional, behind feature)
frankensearch = { workspace = true, optional = true }
# Agent detection integration (optional, behind feature)
franken-agent-detection = { workspace = true, optional = true }
# FrankenRedis session integration (optional, behind feature)
# Pin exact crate versions while sourcing code from the sibling source-of-truth repo.
fr-store = { version = "=0.1.0", path = "../../../frankenredis/crates/fr-store", optional = true }
fr-protocol = { version = "=0.1.0", path = "../../../frankenredis/crates/fr-protocol", optional = true }
fr-config = { version = "=0.1.0", path = "../../../frankenredis/crates/fr-config", optional = true }
fr-expire = { version = "=0.1.0", path = "../../../frankenredis/crates/fr-expire", optional = true }
fr-persist = { version = "=0.1.0", path = "../../../frankenredis/crates/fr-persist", optional = true }

# Semantic search (optional, behind feature)
tokenizers = { version = "0.21", optional = true }
safetensors = { version = "0.5", optional = true }
half = { version = "2.4", optional = true, features = ["num-traits"] }
fastembed = { version = "4", optional = true }
rmp-serde = { version = "1.3", optional = true }

[dev-dependencies]

tokio = { workspace = true, features = ["test-util"] }
proptest = "1.8.0"
tempfile = "3.23.0"
criterion = { version = "0.7.0", features = ["async_tokio"] }
loom = "0.7"

