# FrankenTerm Default Configuration
# Copy to ~/.config/frankenterm/frankenterm.toml to customize.
#
# Docs: all keys map to WezTerm config, with TOML syntax.
# Migration: frankenterm setup migrate-config (converts wezterm.lua)

# --- Appearance ---

color_scheme = "Builtin Dark"

font_size = 14.0

# Bundled fonts: JetBrains Mono, Roboto, Fira Code, Noto Color Emoji
[[font.font]]
family = "JetBrains Mono"

# Disable ligatures for agent-friendly code display
harfbuzz_features = ["calt=0", "clig=0", "liga=0"]

window_background_opacity = 1.0
text_background_opacity = 1.0

# --- Terminal ---

scrollback_lines = 100000
enable_scroll_bar = true

# --- Window ---

initial_rows = 40
initial_cols = 120

window_decorations = "TITLE | RESIZE"
window_close_confirmation = "NeverPrompt"

# Padding inside the terminal area (pixels)
[window_padding]
left = 4
right = 4
top = 4
bottom = 4

# --- Tab Bar ---

enable_tab_bar = true
hide_tab_bar_if_only_one_tab = true
tab_bar_at_bottom = false

# --- Keys ---

# Leader key for chord sequences (like tmux prefix)
# [leader]
# key = "a"
# mods = "CTRL"
# timeout_milliseconds = 1000

# --- Multiplexer ---

# FrankenTerm uses its own mux socket (not WezTerm's).
# Override: FRANKENTERM_UNIX_SOCKET env var

[[unix_domains]]
name = "local"
connect_automatically = false

# --- Swap Layouts (Zellij-inspired) ---

# Enable swap layout cycling (Ctrl+Space to cycle).
# Built-in presets: grid-4, main-side, stacked, main-bottom
swap_layout_enabled = true

# Layout cycle order. Remove entries to disable specific layouts.
# swap_layout_cycle = ["grid-4", "main-side", "stacked", "main-bottom"]

# --- Floating Panes ---

# Enable floating pane support (Ctrl+Shift+F to toggle).
floating_panes_enabled = true

# Default opacity for floating panes (0.0–1.0).
# floating_pane_opacity = 0.95

# --- Resize Reflow Quality ---

# Enable wrap-quality scorecard telemetry during terminal resize.
# Tracks per-line wrap quality to detect bad reflows.
resize_wrap_scorecard_enabled = true

# Enable readability gate: reject reflows that produce unreadable output.
# When gate triggers, falls back to simpler (greedy) wrapping strategy.
resize_wrap_readability_gate_enabled = true

# Max per-line badness delta vs greedy baseline before gate triggers.
# Lower = stricter. 0 = disabled (any badness triggers fallback).
resize_wrap_readability_max_line_badness_delta = 500

# Max aggregate badness delta across all lines before gate triggers.
resize_wrap_readability_max_total_badness_delta = 2000

# Max percent of lines allowed to use fallback wrapping (0-100).
# 20 = at most 20% of lines can fall back before gate rejects the reflow.
resize_wrap_readability_max_fallback_ratio_percent = 20

# KP cost model tuning (advanced — defaults are good for most use cases)
# resize_wrap_kp_badness_scale = 10000
# resize_wrap_kp_forced_break_penalty = 5000
# resize_wrap_kp_lookahead_limit = 64
# resize_wrap_kp_max_dp_states = 8192

# --- SSH Domains ---

# SSH domains are auto-discovered from ~/.ssh/config by default.
# Add explicit entries to override or add custom connections:
#
# [[ssh_domains]]
# name = "production"
# remote_address = "10.0.0.5:22"
# username = "deploy"
# # multiplexing = "WezTerm"  # "WezTerm" (mux) or "None" (direct SSH)
# # ssh_backend = "LibSsh"    # "LibSsh" (default) or "Ssh2"
# # connect_automatically = false
# # default_prog = ["/bin/bash", "-l"]
#
# [[ssh_domains]]
# name = "staging"
# remote_address = "staging.example.com"
# username = "admin"

# --- Performance ---

# Frame rate cap
max_fps = 60

# Front-end renderer
front_end = "WebGpu"

# --- Misc ---

check_for_updates = false
automatically_reload_config = true
